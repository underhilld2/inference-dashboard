<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inference Service Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { color: white; font-size: 2rem; margin-bottom: 5px; }
        .header p { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        
        /* Container */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 20px; }
        
        /* Service Card */
        .card { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid #0f3460; transition: all 0.3s; }
        .card:hover { border-color: #e94560; transform: translateY(-2px); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-title { font-size: 1.1rem; font-weight: 600; color: #e94560; }
        .card-status { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-running { background: #4ade80; color: #064e3b; }
        .status-stopped { background: #f87171; color: #7f1d1d; }
        
        .card-body { margin-bottom: 15px; }
        .card-info { margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        .card-info label { color: #e2e8f0; margin-right: 8px; }
        
        /* Toggle Button */
        .toggle-btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; margin-bottom: 8px; }
        .btn-start { background: #4ade80; color: #064e3b; }
        .btn-stop { background: #f87171; color: #7f1d1d; }
        .btn-restart { background: #60a5fa; color: #1e3a8a; }
        .toggle-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .toggle-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Logs Section */
        .logs-section { background: #0f172a; border-radius: 8px; padding: 15px; font-family: 'Courier New', monospace; font-size: 0.85rem; max-height: 200px; overflow-y: auto; margin-top: 15px; }
        .logs-section h4 { color: #e2e8f0; margin-bottom: 10px; }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #94a3b8; margin-right: 8px; }
        .log-info { color: #60a5fa; }
        .log-warn { color: #fbbf24; }
        .log-error { color: #f87171; }
        
        /* Stats Bar */
        .stats-bar { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-item { background: #0f3460; border-radius: 8px; padding: 15px; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #e94560; }
        .stat-label { font-size: 0.85rem; color: #94a3b8; }
        
        /* Data Availability */
        .data-availability { background: #0f3460; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .data-availability h3 { color: #e94560; margin-bottom: 10px; }
        .data-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .data-link { background: #16213e; color: #60a5fa; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.9rem; border: 1px solid #60a5fa; }
        .data-link:hover { background: #1e293b; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Inference Service Dashboard</h1>
        <p>Manage your llama.cpp services - GPU: 3090 (24GB) + P4 (8GB)</p>
    </div>
    
    <div class="container">
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="cpu-usage">--</div>
                    <div class="stat-label">CPU Usage</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="mem-usage">--</div>
                    <div class="stat-label">Memory</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="gpu-total">--</div>
                    <div class="stat-label">Total VRAM</div>
                </div>
            </div>
        </div>
        
        <!-- Data Availability -->
        <div class="data-availability" id="data-availability" style="display: none;">
            <h3>📊 Historical Data Available</h3>
            <div class="data-links">
                <a href="/reports/" class="data-link" target="_blank">📈 View Performance Reports</a>
                <a href="/data_collector_status/" class="data-link" target="_blank">📈 Data Collector Status</a>
            </div>
        </div>
        
        <!-- Services Grid -->
        <div class="grid" id="services-grid"></div>
    </div>
    
    <script>
        const SERVICES = ['qwen3.5-4b', 'qwen3.5-9b', 'qwen3-14b', 'qwen3.6-27b', 'gpt-oss-20b'];
        const SERVICE_INFO = {
            'qwen3.5-4b': { desc: 'Qwen3.5 4B (3090:8GB)', port: 8087 },
            'qwen3.5-9b': { desc: 'Qwen3.5 9B (3090:16GB)', port: 8088 },
            'qwen3-14b': { desc: 'Qwen3 14B (3090:24GB)', port: 8089 },
            'qwen3.6-27b': { desc: 'Qwen3.6 27B (3090+P4)', port: 8092 },
            'gpt-oss-20b': { desc: 'GPT-OSS 20B (3090+P4)', port: 8091 },
        };
        
        let currentLogs = {};
        
        async function loadServices() {
            const response = await fetch('/api/services');
            const services = await response.json();
            
            const grid = document.getElementById('services-grid');
            grid.innerHTML = services.map(s => `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${s.name}</span>
                        <span class="card-status status-${s.status}">${s.status.toUpperCase()}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-info"><label>Description</label>${s.description}</div>
                        <div class="card-info"><label>Port</label><span style="color:#60a5fa">${s.port}</span></div>
                    </div>
                    <button class="toggle-btn btn-start" onclick="toggle('${s.name}', 'start')">▶ Start</button>
                    <button class="toggle-btn btn-stop" onclick="toggle('${s.name}', 'stop')">■ Stop</button>
                    <button class="toggle-btn btn-restart" onclick="toggle('${s.name}', 'restart')">⟳ Restart</button>
                    <div class="logs-section">
                        <h4>📋 Recent Logs</h4>
                        <div id="logs-${s.name}">Loading...</div>
                    </div>
                </div>
            `).join('');
            
            loadStats();
            loadLogs();
        }
        
        async function toggle(name, action) {
            const btn = event.currentTarget;
            const originalText = btn.textContent;
            
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';
            
            const response = await fetch(`/api/services/${name}/toggle`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action})
            });
            
            const result = await response.json();
            
            if (result.success) {
                btn.textContent = '✅ Done';
                setTimeout(() => {
                    loadServices();
                    showNotification(`Service ${name} ${action === 'start' ? 'started' : 'stopped'}!`);
                }, 1000);
            } else {
                btn.textContent = originalText;
                showNotification(`Error: ${result.error}`, true);
            }
            
            btn.disabled = false;
        }
        
        async function loadLogs() {
            for (const name of SERVICES) {
                const response = await fetch(`/api/services/${name}/logs`);
                const data = await response.json();
                currentLogs[name] = data.logs;
                document.getElementById(`logs-${name}`).innerHTML = formatLogs(data.logs);
            }
        }
        
        function formatLogs(logs) {
            if (!logs) return '<div class="log-entry">No logs available</div>';
            
            return logs.split('\n').filter(l => l.trim()).slice(-20).map((line, i) => {
                const timestamp = new Date().toLocaleTimeString();
                return `<div class="log-entry"><span class="log-time">[${timestamp}]</span><span class="log-info">${line}</span></div>`;
            }).join('');
        }
        
        async function loadStats() {
            // CPU
            const cpuRes = await fetch('/api/system');
            const cpu = await cpuRes.json();
            document.getElementById('cpu-usage').textContent = cpu.cpu_percent + '%';
            
            // Memory
            const memRes = await fetch('/api/system');
            const mem = await memRes.json();
            const memUsed = ((mem.memory_total - mem.memory_available) / mem.memory_total * 100).toFixed(1);
            document.getElementById('mem-usage').textContent = memUsed + '%';
            
            // GPU
            const gpuRes = await fetch('/api/system/gpu');
            const gpu = await gpuRes.json();
            const total = gpu.gpu.reduce((sum, g) => sum + (g.total || 0), 0);
            document.getElementById('gpu-total').textContent = total + ' GB';
        }
        
        function showNotification(message, error = false) {
            const notif = document.createElement('div');
            notif.style.position = 'fixed';
            notif.style.top = '20px';
            notif.style.right = '20px';
            notif.style.padding = '15px 25px';
            notif.style.background = error ? '#f87171' : '#4ade80';
            notif.style.color = '#000';
            notif.style.borderRadius = '8px';
            notif.style.zIndex = '1000';
            notif.textContent = message;
            document.body.appendChild(notif);
            
            setTimeout(() => notif.remove(), 3000);
        }
        
        // Load on startup
        loadServices();
        
        // Auto-refresh every 5 seconds
        setInterval(loadServices, 5000);
    </script>
</body>
</html>
